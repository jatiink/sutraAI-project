<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="chat">
    <header>
      <div>
        <h1>RAG Chatbot</h1>
        <span class="sub">Local · Gemma 4 · answers only from your docs</span>
      </div>
      <div class="header-controls">
        <label class="role">role
          <select id="role">
            <option value="public">public</option>
            <option value="employee">employee</option>
            <option value="manager">manager</option>
          </select>
        </label>
        <button id="new-chat" class="ghost" title="Start a new thread">New chat</button>
      </div>
    </header>

    <div id="messages" class="messages">
      <div class="msg bot">
        <div class="bubble">
          Attach a PDF, Excel, or CSV with the 📎 button to add it to my knowledge,
          then ask me anything about it. I'll only answer from what you've uploaded.
        </div>
      </div>
    </div>

    <div class="composer">
      <div id="attachments" class="attachments hidden">
        <div id="chips"></div>
        <label class="level">index as
          <select id="access-level">
            <option value="public">public</option>
            <option value="employee">employee</option>
            <option value="manager">manager</option>
          </select>
        </label>
      </div>
      <div class="input-row">
        <button id="attach-btn" class="icon-btn" title="Attach documents">📎</button>
        <input type="file" id="files" multiple accept=".pdf,.xlsx,.xls,.csv" hidden />
        <textarea id="question" rows="1" placeholder="Ask about your documents..."></textarea>
        <button id="send-btn" class="send">Send</button>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
